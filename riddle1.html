<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riddle 1</title>
<style>
body{font-family:Arial;text-align:center;background:linear-gradient(45deg,#89f7fe,#66a6ff);padding:40px;}
.box{background:white;padding:25px;border-radius:15px;}
input,button{padding:10px;margin:10px;}
.confetti{position:fixed;width:10px;height:10px;background:red;top:-10px;animation:fall 3s linear forwards;}
@keyframes fall{to{transform:translateY(100vh) rotate(360deg);}}
</style>
</head>
<body>

<div class="box">
<h2>Riddle 1</h2>
<p>I speak without a mouth and hear without ears. What am I?</p>
<input id="ans"><br>
<button onclick="check()">Submit</button>
</div>

<script>
function confetti(){
for(let i=0;i<50;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background=`hsl(${Math.random()*360},100%,50%)`;
document.body.appendChild(c);
setTimeout(()=>c.remove(),3000);
}}
function check(){
let a=document.getElementById("ans").value.toLowerCase();
if(a==="echo"){confetti();setTimeout(()=>location.href="riddle2.html",1200);}
else alert("Wrong answer! Try again.");
}
</script>

</body>
</html>
