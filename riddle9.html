<!DOCTYPE html>
<html><head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Riddle</title>
<style>
body{text-align:center;font-family:Arial;background:linear-gradient(45deg,#ff9a9e,#fad0c4);padding:40px;}
.box{background:white;padding:25px;border-radius:15px;}
input,button{padding:10px;margin:10px;}
.confetti{position:fixed;width:10px;height:10px;top:-10px;animation:fall 3s linear forwards;}
@keyframes fall{to{transform:translateY(100vh) rotate(360deg);}}
</style></head>
<body>
<div class="box">
<h2>Final Riddle 🎉</h2>
<p>What has to be broken before you can use it?</p>
<input id="ans"><br><button onclick="check()">Submit</button>
</div>
<script>
function confetti(){for(let i=0;i<80;i++){let c=document.createElement("div");c.className="confetti";c.style.left=Math.random()*100+"vw";c.style.background=`hsl(${Math.random()*360},100%,50%)`;document.body.appendChild(c);setTimeout(()=>c.remove(),3000);}}
function check(){
if(ans.value.toLowerCase()==="egg"){
confetti();
setTimeout(()=>{
alert("🎉 Congratulations! You completed the game!");
location.href="index.html";
},1500);
}
else alert("Wrong answer!");
}
</script>
</body></html>
